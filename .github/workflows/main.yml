# .github/workflows/runner-smoke-test.yaml
name: runner-smoke-test

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: [self-hosted, linux, x64, k8s-runner]

    steps:
      - uses: actions/checkout@v4

      - name: Show runner details
        run: |
          echo "Hostname: $(hostname)"
          whoami
          kubectl version --client
          helm version
          aws --version
          jf --version
